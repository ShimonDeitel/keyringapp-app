name: Keyring
options:
  bundleIdPrefix: com.shimondeitel.keyringapp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Keyring:
    type: application
    platform: iOS
    sources:
      - path: Keyring
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.keyringapp
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Keyring/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  KeyringTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KeyringTests
      - path: Keyring.storekit
    dependencies:
      - target: Keyring
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.keyringapp.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  KeyringUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KeyringUITests
    dependencies:
      - target: Keyring
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.keyringapp.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Keyring:
    build:
      targets:
        Keyring: all
        KeyringTests: [test]
        KeyringUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Keyring.storekit
    test:
      config: Debug
      storeKitConfiguration: Keyring.storekit
      targets:
        - KeyringTests
        - KeyringUITests
    archive:
      config: Release
